<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieTracker</title>
</head>
<body class="font-sans bg-gray-100 text-gray-800 m-0">

  <div class="global">
    <!-- Top Panel -->
    <header class="panel bg-gray-900 text-white p-4 flex items-center justify-between">
      <h1 class="text-2xl m-0">MovieTracker</h1>
      <input class="p-2 rounded ml-5 border-0" type="text" id="search" placeholder="Search movies...">
      <div class="buttons flex gap-3">
        <button id="account" class="bg-gray-700 text-white py-2 px-3 rounded hover:bg-gray-600">Account</button>
        <button id="favourite" class="bg-gray-700 text-white py-2 px-3 rounded hover:bg-gray-600">Favourite</button>
        <button id="addFilm" class="bg-gray-700 text-white py-2 px-3 rounded hover:bg-gray-600">Add Film</button>
        <button id="quit" class="bg-gray-700 text-white py-2 px-3 rounded hover:bg-gray-600">Quit</button>
      </div>
    </header>

  
    <main class="lists p-5">
      <h2 class="mb-4 text-xl">List of Movies</h2>
      <div id="movies-list" class="list grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-5">
       
      </div>
    </main>
  </div>
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md mx-4">
    <h3 class="text-xl font-bold mb-1">Add New Film</h3>

    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium mb-1">Title *</label>
        <input id="m-title" type="text" placeholder="e.g. Interstellar"
          class="w-full border border-gray-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Year</label>
        <input id="m-year" type="number" placeholder="e.g. 2014"
          class="w-full border border-gray-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Genre</label>
        <input id="m-genre" type="text" placeholder="e.g. Sci-Fi"
          class="w-full border border-gray-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Poster URL</label>
        <input id="m-poster" type="url" placeholder="https://..."
          class="w-full border border-gray-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Description</label>
        <textarea id="m-desc" rows="3" placeholder="Short description..."
          class="w-full border border-gray-300 rounded px-3 py-2 resize-none"></textarea>
      </div>
    </div>

    <p id="modal-error" class="text-red-500 text-sm mt-2 hidden"></p>

    <div class="flex gap-3 mt-5 justify-end">
      <button id="modal-cancel" class="px-4 py-2 rounded bg-gray-200 text-gray-700">Cancel</button>
      <button id="modal-submit" class="px-4 py-2 rounded bg-blue-600 text-white font-semibold">Add Film</button>
    </div>
  </div>
</div>
  <script src="home.js"></script>
</body>
</html>
